<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@200;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0e11;
    --surface: #19171e;
    --ring-bg: #2a2733;
    --accent: #a89fd8;
    --accent2: #c8c0f0;
    --text: #f0ece4;
    --muted: #7a7385;
    --glow: rgba(168, 159, 216, 0.28);
  }

  body {
    background: var(--bg);
    font-family: 'Montserrat', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
    color: var(--text);
  }

  /* ── Setup screen ── */
  #setup {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    width: 100%;
    max-width: 340px;
    animation: fadeIn 0.6s ease;
  }

  #setup h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    font-weight: 300;
    letter-spacing: 0.12em;
    color: var(--accent2);
    text-align: center;
  }

  #setup p {
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
  }

  .input-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
    width: 100%;
  }

  .input-group label {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .input-group input {
    background: var(--surface);
    border: 1px solid var(--ring-bg);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Montserrat', sans-serif;
    font-size: 0.85rem;
    padding: 10px 14px;
    width: 100%;
    outline: none;
    transition: border-color 0.2s;
  }

  .input-group input:focus { border-color: var(--accent); }
  .input-group input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.6); }

  .btn {
    background: transparent;
    border: 1px solid var(--accent);
    border-radius: 6px;
    color: var(--accent2);
    cursor: pointer;
    font-family: 'Montserrat', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    padding: 12px 28px;
    text-transform: uppercase;
    transition: background 0.2s, box-shadow 0.2s;
    width: 100%;
  }

  .btn:hover { background: rgba(168,159,216,0.12); box-shadow: 0 0 18px var(--glow); }

  /* ── Widget screen ── */
  #widget {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 36px;
    animation: fadeIn 0.8s ease;
  }

  .event-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.6rem;
    font-weight: 400;
    letter-spacing: 0.1em;
    color: var(--accent2);
    text-align: center;
  }

  .ring-wrap svg {
    filter: drop-shadow(0 0 18px var(--glow));
    overflow: visible;
  }

  .track { stroke: var(--ring-bg); }
  .progress {
    stroke: var(--accent);
    stroke-linecap: round;
    transition: stroke-dashoffset 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    filter: drop-shadow(0 0 6px var(--accent));
  }

  /* ── Footer ── */
  .footer-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }

  .target-date {
    font-size: 0.65rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .reset-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.6rem;
    font-family: 'Montserrat', sans-serif;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    text-decoration: underline;
    padding: 4px;
    transition: color 0.2s;
  }
  .reset-btn:hover { color: var(--accent); }

  /* ── Done screen ── */
  #done {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    animation: fadeIn 0.8s ease;
  }

  #done .big {
    font-family: 'Cormorant Garamond', serif;
    font-size: 3.5rem;
    font-weight: 300;
    color: var(--accent2);
    letter-spacing: 0.06em;
    text-align: center;
  }

  #done .sub {
    font-size: 0.7rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<!-- Setup -->
<div id="setup">
  <h1>Countdown</h1>
  <p>Set your target date</p>

  <div class="input-group">
    <label>Event name</label>
    <input type="text" id="eventName" placeholder="e.g. Trip to Japan" maxlength="40">
  </div>

  <div class="input-group">
    <label>Target date</label>
    <input type="date" id="targetDate">
  </div>

  <button class="btn" onclick="startCountdown()">Start Countdown</button>
</div>

<!-- Widget -->
<div id="widget">
  <div class="event-title" id="widgetTitle"></div>

  <div class="ring-wrap">
    <svg width="200" height="200" viewBox="0 0 200 200">
      <circle cx="100" cy="100" r="92" fill="none" stroke="#1e1c24" stroke-width="1"/>
      <circle class="track" cx="100" cy="100" r="80" fill="none" stroke-width="10"/>
      <circle id="ringDays" class="progress" cx="100" cy="100" r="80"
        fill="none" stroke-width="10"
        stroke-dasharray="502.65"
        stroke-dashoffset="502.65"
        transform="rotate(-90 100 100)"/>
      <circle cx="100" cy="100" r="67" fill="none" stroke="#1e1c24" stroke-width="1"/>
      <text id="numDays" x="100" y="92" text-anchor="middle"
        fill="#f0ece4" font-family="Cormorant Garamond, serif"
        font-size="54" font-weight="300">0</text>
      <text x="100" y="118" text-anchor="middle"
        fill="#7a7385" font-family="Montserrat, sans-serif"
        font-size="10" letter-spacing="5">DAYS</text>
    </svg>
  </div>

  <div style="display:flex;flex-direction:column;align-items:center;gap:10px;">
    <div class="footer-row">
      <div class="dot"></div>
      <span class="target-date" id="targetDisplay"></span>
    </div>
    <button class="reset-btn" onclick="resetWidget()">Change date</button>
  </div>
</div>

<!-- Done -->
<div id="done">
  <div class="big">✦</div>
  <div class="big" id="doneTitle"></div>
  <div class="sub">The day has arrived</div>
  <button class="reset-btn" onclick="resetWidget()">Set a new countdown</button>
</div>

<script>
  const CIRC = 2 * Math.PI * 80;

  let timer = null;
  let targetMs = null;
  let startMs = null;

  function setOffset(el, value, max) {
    const pct = Math.max(0, Math.min(1, value / max));
    el.style.strokeDashoffset = CIRC * (1 - pct);
  }

  function getMidnight(dateMs) {
    const d = new Date(dateMs);
    d.setHours(0, 0, 0, 0);
    return d.getTime();
  }

  function startCountdown() {
    const name = document.getElementById('eventName').value.trim() || 'Countdown';
    const dateVal = document.getElementById('targetDate').value;
    if (!dateVal) { alert('Please pick a date!'); return; }

    const [y, m, d] = dateVal.split('-').map(Number);
    targetMs = new Date(y, m - 1, d, 0, 0, 0, 0).getTime();
    startMs  = getMidnight(Date.now());

    const dayAfterTarget = targetMs + 86400000;
    if (getMidnight(Date.now()) >= dayAfterTarget) {
      showDone(name);
      return;
    }

    document.getElementById('widgetTitle').textContent = name;
    document.getElementById('targetDisplay').textContent =
      new Date(targetMs).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });

    document.getElementById('setup').style.display  = 'none';
    document.getElementById('done').style.display   = 'none';
    document.getElementById('widget').style.display = 'flex';

    tick();
    timer = setInterval(tick, 60000);
  }

  function tick() {
    const todayMidnight = getMidnight(Date.now());
    const dayAfterTarget = targetMs + 86400000;

    if (todayMidnight >= dayAfterTarget) {
      clearInterval(timer);
      const title = document.getElementById('widgetTitle').textContent;
      showDone(title);
      return;
    }

    const msPerDay = 86400000;
    const daysLeft = Math.max(0, Math.round((targetMs - todayMidnight) / msPerDay));

    document.getElementById('numDays').textContent = daysLeft;

    const totalDays = Math.max(1, Math.round((targetMs - startMs) / msPerDay));
    const elapsed = totalDays - daysLeft;
    setOffset(document.getElementById('ringDays'), elapsed, totalDays);
  }

  function showDone(name) {
    document.getElementById('setup').style.display  = 'none';
    document.getElementById('widget').style.display = 'none';
    document.getElementById('done').style.display   = 'flex';
    document.getElementById('doneTitle').textContent = name;
  }

  function resetWidget() {
    clearInterval(timer);
    document.getElementById('widget').style.display = 'none';
    document.getElementById('done').style.display   = 'none';
    document.getElementById('setup').style.display  = 'flex';
    document.getElementById('eventName').value = '';
    document.getElementById('targetDate').value = '';
  }
</script>
</body>
</html>
